name: Deploy to GitHub Pages

# Triggered on every push to `main`, and manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. New pushes cancel an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Add wasm32 Rust target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # With a custom domain (CNAME file present in repo root) Pages serves
      # from `/`; without one it serves from `/<repo>/`. Pick the right
      # public URL for asset path resolution either way.
      - name: Build (trunk)
        run: |
          if [ -f CNAME ]; then
            echo "CNAME found ($(cat CNAME)) — building for custom-domain root"
            trunk build --release --public-url "/"
          else
            echo "No CNAME — building for sub-path /${REPO}/"
            trunk build --release --public-url "/${REPO}/"
          fi
        env:
          REPO: ${{ github.event.repository.name }}

      # Pass CNAME through to the artifact so GH Pages routes the custom
      # domain even when deploying via Actions (rather than "from a branch").
      - name: Copy CNAME into dist
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
